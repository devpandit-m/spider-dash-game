<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spider Dash | Day & Night</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <!-- Sky Object (Sun/Moon) -->
        <div id="sky-obj">☀️</div>
        
        <div id="ui-layer">
            <div id="score">Score: 0</div>
            <div id="high-score">Best: 0</div>
        </div>

        <div id="player">🕷️</div>
        
        <!-- Main/Game Over Menu -->
        <div id="menu">
            <h1 id="menu-title">SPIDER DASH</h1>
            <p id="menu-msg">Jump over LOW birds. Stay still for HIGH birds.</p>
            
            <div class="button-group">
                <button id="start-btn">START GAME</button>
                <button id="quit-btn">QUIT</button>
            </div>
            
            <div class="hint">SPACE or CLICK to Jump</div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
